<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — To Do List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ===== PROFILE + TIME ===== -->
  <div class="card header-card">
    <div class="profile">
      <div class="profile-avatar" id="avatarInitial">U</div>
      <div class="profile-info">
        <div class="name" id="profileName">Karyawan</div>
        <div class="role" id="profileRole">Staff Umum</div>
      </div>
    </div>
    <div class="time-block">
      <div class="day" id="currentDay"></div>
      <div class="date" id="currentDate"></div>
    </div>
  </div>
   <!-- ===== INPUT TASK ===== -->
  <div class="card">
    <div class="app-title">
      <div class="icon">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 11l3 3L22 4"/>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
        </svg>
      </div>
      <h1>TaskFlow</h1>
      <span class="badge" id="totalBadge">0 tugas</span>
    </div>

    <div class="input-section">
      <textarea id="taskInput" placeholder="Tulis tugas kamu di sini..."></textarea>

      <div class="input-row">
        <div class="priority-group">
          <button class="priority-btn active" data-priority="low">🟢 Low</button>
          <button class="priority-btn" data-priority="medium">🟡 Medium</button>
          <button class="priority-btn" data-priority="high">🔴 High</button>
        </div>
        <button class="btn-submit" onclick="addTask()">
          <svg viewBox="0 0 24 24" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Tambah
        </button>
      </div>
    </div>
  </div>
  <!-- ===== TO DO LIST ===== -->
  <div class="card">
    <div class="section-header">
      <div class="section-title">
        <span class="dot dot-todo"></span>
        To Do
        <span class="count-badge todo" id="todoCount">0</span>
      </div>
      <button class="btn-delete-all" onclick="deleteAll()">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
          <path d="M9 6V4h6v2"/>
        </svg>
        Hapus Semua
      </button>
    </div>

    <div class="task-list" id="todoList">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <path d="M8 12h8M8 8h8M8 16h5"/>
        </svg>
        <p>Belum ada tugas. Yuk tambahkan!</p>
      </div>
    </div>
  </div>

  <!-- ===== OVERDUE ===== -->
  <div class="card overdue-card" id="overdueSection" style="display:none;">
    <div class="section-header">
      <div class="section-title">
        <span class="dot dot-overdue"></span>
        Overdue / Terlambat
        <span class="count-badge overdue" id="overdueCount">0</span>
      </div>
    </div>
    <div class="task-list" id="overdueList"></div>
  </div>
 <!-- ===== DONE ===== -->
  <div class="card" id="doneSection" style="display:none;">
    <div class="section-header">
      <div class="section-title">
        <span class="dot dot-done"></span>
        Done
        <span class="count-badge done" id="doneCount">0</span>
      </div>
    </div>
    <div class="task-list" id="doneList"></div>
  </div>

</div>

<!-- Toast notifikasi -->
<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
